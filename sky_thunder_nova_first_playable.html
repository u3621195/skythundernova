<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Sky Thunder Nova - First Playable</title>
<style>
  :root {
    --bg: #050816;
    --panel: rgba(8, 14, 32, 0.82);
    --line: rgba(125, 220, 255, 0.45);
    --text: #e8f8ff;
    --muted: #8cb7c8;
    --hot: #ffdf5c;
    --danger: #ff5b7a;
    --good: #52ffa8;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 10%, #183764 0%, #071020 38%, #030511 100%);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    touch-action: none;
  }

  #wrap {
    width: 100vw;
    height: 100vh;
    display: grid;
    place-items: center;
    padding: 10px;
  }

  #gameShell {
    position: relative;
    width: min(100vw, 540px);
    height: min(100vh, 900px);
    aspect-ratio: 9 / 16;
    border: 2px solid var(--line);
    border-radius: 22px;
    overflow: hidden;
    background: #02040c;
    box-shadow: 0 0 32px rgba(90, 218, 255, 0.22), inset 0 0 28px rgba(90, 218, 255, 0.08);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #02040c;
  }

  #hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .topbar {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: center;
    font-weight: 800;
    text-shadow: 0 2px 8px #000;
    font-size: 14px;
  }

  .pill {
    background: var(--panel);
    border: 1px solid rgba(125, 220, 255, 0.28);
    border-radius: 999px;
    padding: 7px 10px;
    box-shadow: inset 0 0 16px rgba(125, 220, 255, 0.07);
  }

  #message {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 24px;
    text-align: center;
    background: radial-gradient(circle, rgba(12, 26, 54, 0.78), rgba(2, 4, 12, 0.92));
  }

  #message.hidden { display: none; }

  .card {
    width: min(92%, 410px);
    border: 1px solid rgba(125, 220, 255, 0.42);
    border-radius: 24px;
    padding: 26px 22px;
    background: rgba(7, 15, 33, 0.88);
    box-shadow: 0 0 38px rgba(88, 210, 255, 0.18);
  }

  h1 {
    margin: 0 0 8px;
    font-size: clamp(34px, 8vw, 52px);
    line-height: 0.9;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow:
      0 3px 0 #173b7a,
      0 0 18px rgba(97, 226, 255, 0.75);
  }

  .subtitle {
    margin: 0 0 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .tips {
    text-align: left;
    margin: 16px auto 22px;
    max-width: 310px;
    color: #d4f4ff;
    font-size: 14px;
    line-height: 1.45;
  }

  button {
    pointer-events: auto;
    border: 0;
    border-radius: 999px;
    padding: 13px 22px;
    font-size: 15px;
    font-weight: 900;
    color: #071020;
    background: linear-gradient(180deg, #fff275, #ffb12e);
    box-shadow: 0 8px 20px rgba(255, 181, 50, 0.25);
    cursor: pointer;
  }

  button:active { transform: translateY(1px); }

  #controls {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 18px;
    display: none;
    justify-content: space-between;
    padding: 0 18px;
    pointer-events: none;
  }

  .controlBtn {
    pointer-events: auto;
    width: 74px;
    height: 74px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    border: 1px solid rgba(125, 220, 255, 0.28);
    background: rgba(8, 14, 32, 0.62);
    color: #e8f8ff;
    font-weight: 900;
    user-select: none;
    backdrop-filter: blur(8px);
  }

  .bombBtn {
    background: rgba(255, 91, 122, 0.34);
    border-color: rgba(255, 91, 122, 0.65);
  }

  @media (pointer: coarse) {
    #controls { display: flex; }
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="gameShell">
    <canvas id="game" width="540" height="960"></canvas>

    <div id="hud">
      <div class="topbar">
        <div class="pill">SCORE <span id="score">0</span></div>
        <div class="pill">LIVES <span id="lives">3</span></div>
        <div class="pill">BOMBS <span id="bombs">2</span></div>
        <div class="pill">WPN <span id="weapon">1</span></div>
      </div>

      <div id="controls">
        <div class="controlBtn" id="dragHint">MOVE</div>
        <div class="controlBtn bombBtn" id="bombTouch">BOMB</div>
      </div>

      <div id="message">
        <div class="card">
          <h1>SKY<br>THUNDER<br>NOVA</h1>
          <p class="subtitle">First playable vertical shooter prototype</p>
          <div class="tips">
            <b>Desktop:</b> Arrow/WASD to move, Space to bomb.<br>
            <b>Mobile:</b> Drag anywhere to move, tap BOMB.<br><br>
            Auto-fire is always on. Collect glowing upgrades.
          </div>
          <button id="startBtn">START MISSION</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const scoreEl = document.getElementById("score");
  const livesEl = document.getElementById("lives");
  const bombsEl = document.getElementById("bombs");
  const weaponEl = document.getElementById("weapon");
  const message = document.getElementById("message");
  const startBtn = document.getElementById("startBtn");
  const bombTouch = document.getElementById("bombTouch");

  const W = canvas.width;
  const H = canvas.height;

  let running = false;
  let gameOver = false;
  let win = false;
  let time = 0;
  let score = 0;
  let shake = 0;
  let keys = {};
  let pointer = { active: false, x: W / 2, y: H * 0.78 };

  const player = {
    x: W / 2,
    y: H * 0.80,
    r: 13,
    speed: 5.8,
    lives: 3,
    bombs: 2,
    weapon: 1,
    invuln: 0,
    fireCd: 0
  };

  let bullets = [];
  let enemies = [];
  let enemyBullets = [];
  let particles = [];
  let powerups = [];
  let stars = [];
  let boss = null;
  let bossSpawned = false;
  let bossDefeated = false;
  let spawnTimer = 0;

  for (let i = 0; i < 96; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      s: 0.6 + Math.random() * 2.2,
      v: 0.7 + Math.random() * 3.5
    });
  }

  function resetGame() {
    running = true;
    gameOver = false;
    win = false;
    time = 0;
    score = 0;
    shake = 0;
    bullets = [];
    enemies = [];
    enemyBullets = [];
    particles = [];
    powerups = [];
    boss = null;
    bossSpawned = false;
    bossDefeated = false;
    spawnTimer = 0;

    Object.assign(player, {
      x: W / 2,
      y: H * 0.80,
      lives: 3,
      bombs: 2,
      weapon: 1,
      invuln: 140,
      fireCd: 0
    });

    updateHud();
    message.classList.add("hidden");
  }

  function updateHud() {
    scoreEl.textContent = score.toLocaleString();
    livesEl.textContent = player.lives;
    bombsEl.textContent = player.bombs;
    weaponEl.textContent = player.weapon;
  }

  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

  function spawnParticle(x, y, color, count = 14, power = 4) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const v = Math.random() * power + 1;
      particles.push({
        x, y,
        vx: Math.cos(a) * v,
        vy: Math.sin(a) * v,
        life: 28 + Math.random() * 24,
        maxLife: 52,
        color,
        r: 1.8 + Math.random() * 3
      });
    }
  }

  function spawnEnemy(type, x, y) {
    const data = {
      scout: { hp: 2, r: 17, speed: 2.2, score: 120, color: "#ff5b7a" },
      tank: { hp: 7, r: 24, speed: 1.1, score: 400, color: "#ff9b4f" },
      zig: { hp: 3, r: 18, speed: 1.7, score: 180, color: "#bd7cff" }
    }[type];

    enemies.push({
      type, x, y,
      hp: data.hp,
      maxHp: data.hp,
      r: data.r,
      speed: data.speed,
      score: data.score,
      color: data.color,
      fireCd: 50 + Math.random() * 60,
      t: 0
    });
  }

  function spawnWave() {
    const pattern = Math.floor(Math.random() * 5);
    if (pattern === 0) {
      for (let i = 0; i < 5; i++) spawnEnemy("scout", 90 + i * 90, -40 - i * 20);
    } else if (pattern === 1) {
      for (let i = 0; i < 4; i++) spawnEnemy("zig", 80 + i * 120, -45 - i * 35);
    } else if (pattern === 2) {
      spawnEnemy("tank", 160, -50);
      spawnEnemy("tank", 380, -90);
    } else if (pattern === 3) {
      for (let i = 0; i < 6; i++) spawnEnemy("scout", 60 + i * 84, -30);
      spawnEnemy("tank", W / 2, -120);
    } else {
      spawnEnemy("zig", 110, -45);
      spawnEnemy("zig", 430, -45);
      spawnEnemy("scout", 220, -95);
      spawnEnemy("scout", 320, -95);
    }
  }

  function spawnBoss() {
    bossSpawned = true;
    boss = {
      x: W / 2,
      y: -90,
      targetY: 150,
      hp: 260,
      maxHp: 260,
      r: 62,
      t: 0,
      fireCd: 0,
      phase: 1
    };
  }

  function shootPlayer() {
    const wpn = player.weapon;
    bullets.push({ x: player.x, y: player.y - 24, vx: 0, vy: -10.5, r: 5, dmg: 1.2, color: "#70e8ff" });

    if (wpn >= 2) {
      bullets.push({ x: player.x - 18, y: player.y - 16, vx: -1.8, vy: -9.4, r: 4, dmg: 0.9, color: "#ffdf5c" });
      bullets.push({ x: player.x + 18, y: player.y - 16, vx: 1.8, vy: -9.4, r: 4, dmg: 0.9, color: "#ffdf5c" });
    }

    if (wpn >= 3) {
      bullets.push({ x: player.x - 28, y: player.y - 8, vx: -3.2, vy: -8.2, r: 4, dmg: 0.8, color: "#52ffa8" });
      bullets.push({ x: player.x + 28, y: player.y - 8, vx: 3.2, vy: -8.2, r: 4, dmg: 0.8, color: "#52ffa8" });
    }
  }

  function fireEnemy(e) {
    const angle = Math.atan2(player.y - e.y, player.x - e.x);
    const speed = e.type === "tank" ? 3.0 : 3.6;
    enemyBullets.push({
      x: e.x, y: e.y + e.r * 0.4,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 6,
      color: "#ff6e91"
    });
  }

  function fireBoss() {
    if (!boss) return;
    boss.phase = boss.hp > 170 ? 1 : boss.hp > 80 ? 2 : 3;

    if (boss.phase === 1) {
      for (let i = -2; i <= 2; i++) {
        enemyBullets.push({
          x: boss.x, y: boss.y + 44,
          vx: i * 1.1,
          vy: 3.6,
          r: 6,
          color: "#ff6e91"
        });
      }
    } else if (boss.phase === 2) {
      const base = Math.atan2(player.y - boss.y, player.x - boss.x);
      for (let i = -1; i <= 1; i++) {
        const a = base + i * 0.24;
        enemyBullets.push({
          x: boss.x, y: boss.y + 48,
          vx: Math.cos(a) * 4.0,
          vy: Math.sin(a) * 4.0,
          r: 6,
          color: "#ffdf5c"
        });
      }
    } else {
      for (let i = 0; i < 14; i++) {
        const a = (Math.PI * 2 / 14) * i + boss.t * 0.035;
        enemyBullets.push({
          x: boss.x, y: boss.y,
          vx: Math.cos(a) * 2.7,
          vy: Math.sin(a) * 2.7,
          r: 5,
          color: "#bd7cff"
        });
      }
    }
  }

  function useBomb() {
    if (!running || player.bombs <= 0) return;
    player.bombs--;
    enemyBullets = [];
    shake = 20;
    spawnParticle(player.x, player.y, "#ffdf5c", 80, 9);

    enemies.forEach(e => e.hp -= 5);
    if (boss) boss.hp -= 22;
    updateHud();
  }

  function damagePlayer() {
    if (player.invuln > 0) return;
    player.lives--;
    player.invuln = 140;
    shake = 22;
    spawnParticle(player.x, player.y, "#70e8ff", 48, 7);

    if (player.lives <= 0) {
      running = false;
      gameOver = true;
      showEnd(false);
    }
    updateHud();
  }

  function dropPowerup(x, y) {
    if (Math.random() < 0.28) {
      const type = Math.random() < 0.72 ? "weapon" : "bomb";
      powerups.push({ x, y, type, r: 13, vy: 2.3, t: 0 });
    }
  }

  function showEnd(victory) {
    const title = victory ? "MISSION<br>CLEAR" : "GAME<br>OVER";
    const text = victory
      ? "You defeated the prototype boss. Next step: add Stage 2, more weapons, and better sprites."
      : "Try again. Dodge first, collect upgrades, and save bombs for the boss.";
    message.innerHTML = `
      <div class="card">
        <h1>${title}</h1>
        <p class="subtitle">${text}</p>
        <div class="tips" style="text-align:center">
          Final Score: <b>${score.toLocaleString()}</b>
        </div>
        <button id="restartBtn">PLAY AGAIN</button>
      </div>`;
    message.classList.remove("hidden");
    document.getElementById("restartBtn").addEventListener("click", resetGame);
  }

  function update() {
    if (!running) return;

    time++;

    if (shake > 0) shake--;

    stars.forEach(s => {
      s.y += s.v;
      if (s.y > H) {
        s.y = -4;
        s.x = Math.random() * W;
      }
    });

    let dx = 0, dy = 0;
    if (keys.ArrowLeft || keys.a) dx--;
    if (keys.ArrowRight || keys.d) dx++;
    if (keys.ArrowUp || keys.w) dy--;
    if (keys.ArrowDown || keys.s) dy++;

    if (pointer.active) {
      const easing = 0.18;
      player.x += (pointer.x - player.x) * easing;
      player.y += (pointer.y - player.y) * easing;
    } else {
      const len = Math.hypot(dx, dy) || 1;
      player.x += (dx / len) * player.speed;
      player.y += (dy / len) * player.speed;
    }

    player.x = clamp(player.x, 24, W - 24);
    player.y = clamp(player.y, 90, H - 34);

    if (player.invuln > 0) player.invuln--;

    player.fireCd--;
    if (player.fireCd <= 0) {
      shootPlayer();
      player.fireCd = 8;
    }

    bullets.forEach(b => {
      b.x += b.vx;
      b.y += b.vy;
    });
    bullets = bullets.filter(b => b.y > -40 && b.y < H + 40 && b.x > -50 && b.x < W + 50);

    if (!bossSpawned) {
      spawnTimer--;
      if (spawnTimer <= 0) {
        spawnWave();
        spawnTimer = 72 + Math.random() * 40;
      }
      if (time > 2900) spawnBoss();
    }

    enemies.forEach(e => {
      e.t++;
      if (e.type === "zig") e.x += Math.sin(e.t * 0.055) * 2.2;
      e.y += e.speed;

      e.fireCd--;
      if (e.fireCd <= 0 && e.y > 40 && e.y < H * 0.70) {
        fireEnemy(e);
        e.fireCd = e.type === "tank" ? 76 : 110 + Math.random() * 50;
      }
    });

    enemies = enemies.filter(e => e.y < H + 70 && e.hp > 0);

    if (boss) {
      boss.t++;
      boss.y += (boss.targetY - boss.y) * 0.025;
      boss.x = W / 2 + Math.sin(boss.t * 0.025) * 112;

      boss.fireCd--;
      if (boss.fireCd <= 0) {
        fireBoss();
        boss.fireCd = boss.phase === 3 ? 30 : 42;
      }

      if (boss.hp <= 0) {
        bossDefeated = true;
        running = false;
        win = true;
        score += 5000;
        spawnParticle(boss.x, boss.y, "#ffdf5c", 160, 10);
        showEnd(true);
        boss = null;
        updateHud();
      }
    }

    enemyBullets.forEach(b => {
      b.x += b.vx;
      b.y += b.vy;
    });
    enemyBullets = enemyBullets.filter(b => b.x > -60 && b.x < W + 60 && b.y > -80 && b.y < H + 80);

    powerups.forEach(p => {
      p.t++;
      p.y += p.vy;
    });
    powerups = powerups.filter(p => p.y < H + 40);

    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.life--;
    });
    particles = particles.filter(p => p.life > 0);

    // Collisions: player bullets vs enemies
    for (const b of bullets) {
      for (const e of enemies) {
        if (dist(b, e) < b.r + e.r) {
          e.hp -= b.dmg;
          b.y = -999;
          spawnParticle(b.x, b.y, b.color, 3, 2);
          if (e.hp <= 0) {
            score += e.score;
            spawnParticle(e.x, e.y, e.color, 30, 6);
            dropPowerup(e.x, e.y);
          }
          break;
        }
      }

      if (boss && dist(b, boss) < b.r + boss.r) {
        boss.hp -= b.dmg;
        b.y = -999;
        if (time % 3 === 0) spawnParticle(b.x, b.y, b.color, 2, 2);
      }
    }

    bullets = bullets.filter(b => b.y > -80);

    // Enemy / bullets vs player
    for (const e of enemies) {
      if (dist(player, e) < player.r + e.r) {
        e.hp = 0;
        damagePlayer();
        spawnParticle(e.x, e.y, e.color, 24, 6);
      }
    }

    for (const b of enemyBullets) {
      if (dist(player, b) < player.r + b.r) {
        b.y = H + 999;
        damagePlayer();
      }
    }
    enemyBullets = enemyBullets.filter(b => b.y < H + 500);

    if (boss && dist(player, boss) < player.r + boss.r) {
      damagePlayer();
    }

    for (const p of powerups) {
      if (dist(player, p) < player.r + p.r + 8) {
        if (p.type === "weapon") player.weapon = Math.min(3, player.weapon + 1);
        if (p.type === "bomb") player.bombs = Math.min(5, player.bombs + 1);
        score += 250;
        p.y = H + 999;
        spawnParticle(p.x, p.y, p.type === "weapon" ? "#52ffa8" : "#ffdf5c", 18, 4);
        updateHud();
      }
    }
    powerups = powerups.filter(p => p.y < H + 100);

    updateHud();
  }

  function drawShip(x, y, invuln = 0) {
    ctx.save();
    ctx.translate(x, y);
    if (invuln > 0 && Math.floor(invuln / 6) % 2 === 0) ctx.globalAlpha = 0.42;

    ctx.shadowBlur = 16;
    ctx.shadowColor = "#70e8ff";

    ctx.fillStyle = "#dffaff";
    ctx.beginPath();
    ctx.moveTo(0, -24);
    ctx.lineTo(18, 18);
    ctx.lineTo(0, 9);
    ctx.lineTo(-18, 18);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#3278ff";
    ctx.beginPath();
    ctx.moveTo(0, -12);
    ctx.lineTo(8, 10);
    ctx.lineTo(0, 5);
    ctx.lineTo(-8, 10);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#ffdf5c";
    ctx.fillRect(-4, 16, 8, 10);

    ctx.restore();
  }

  function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.shadowBlur = 12;
    ctx.shadowColor = e.color;
    ctx.fillStyle = e.color;

    if (e.type === "tank") {
      ctx.beginPath();
      ctx.roundRect(-24, -18, 48, 36, 10);
      ctx.fill();
      ctx.fillStyle = "#3a1430";
      ctx.fillRect(-6, 8, 12, 22);
    } else {
      ctx.beginPath();
      ctx.moveTo(0, 22);
      ctx.lineTo(22, -10);
      ctx.lineTo(8, -18);
      ctx.lineTo(0, -8);
      ctx.lineTo(-8, -18);
      ctx.lineTo(-22, -10);
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();
  }

  function drawBoss() {
    if (!boss) return;
    ctx.save();
    ctx.translate(boss.x, boss.y);
    ctx.shadowBlur = 22;
    ctx.shadowColor = "#ff5b7a";

    ctx.fillStyle = "#a62d59";
    ctx.beginPath();
    ctx.roundRect(-80, -38, 160, 76, 24);
    ctx.fill();

    ctx.fillStyle = "#ff9b4f";
    ctx.beginPath();
    ctx.moveTo(-92, 16); ctx.lineTo(-38, 42); ctx.lineTo(-58, 8); ctx.closePath();
    ctx.moveTo(92, 16); ctx.lineTo(38, 42); ctx.lineTo(58, 8); ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#241225";
    ctx.beginPath();
    ctx.roundRect(-24, -20, 48, 40, 12);
    ctx.fill();

    ctx.fillStyle = "#70e8ff";
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    const barW = W - 80;
    const hp = boss.hp / boss.maxHp;
    ctx.fillStyle = "rgba(255,255,255,0.14)";
    ctx.fillRect(40, 58, barW, 8);
    ctx.fillStyle = "#ff5b7a";
    ctx.fillRect(40, 58, barW * hp, 8);
  }

  function drawPowerup(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.t * 0.04);
    ctx.shadowBlur = 18;
    ctx.shadowColor = p.type === "weapon" ? "#52ffa8" : "#ffdf5c";
    ctx.fillStyle = p.type === "weapon" ? "#52ffa8" : "#ffdf5c";
    ctx.beginPath();
    ctx.roundRect(-13, -13, 26, 26, 6);
    ctx.fill();
    ctx.rotate(-p.t * 0.04);
    ctx.fillStyle = "#071020";
    ctx.font = "900 15px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(p.type === "weapon" ? "W" : "B", 0, 1);
    ctx.restore();
  }

  function render() {
    ctx.save();
    if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

    ctx.clearRect(0, 0, W, H);

    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#06122c");
    g.addColorStop(0.48, "#04101f");
    g.addColorStop(1, "#02040c");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // runway/grid background
    ctx.strokeStyle = "rgba(112, 232, 255, 0.08)";
    ctx.lineWidth = 1;
    for (let y = (time * 3) % 54; y < H; y += 54) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
    for (let x = 0; x <= W; x += 90) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + Math.sin(time * 0.005) * 28, H);
      ctx.stroke();
    }

    stars.forEach(s => {
      ctx.fillStyle = `rgba(220, 250, 255, ${0.25 + s.s * 0.18})`;
      ctx.fillRect(s.x, s.y, s.s, s.s * 2.8);
    });

    powerups.forEach(drawPowerup);

    bullets.forEach(b => {
      ctx.save();
      ctx.shadowBlur = 14;
      ctx.shadowColor = b.color;
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    enemies.forEach(drawEnemy);
    drawBoss();

    enemyBullets.forEach(b => {
      ctx.save();
      ctx.shadowBlur = 12;
      ctx.shadowColor = b.color;
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    drawShip(player.x, player.y, player.invuln);

    particles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    ctx.restore();

    requestAnimationFrame(loop);
  }

  function loop() {
    update();
    render();
  }

  startBtn.addEventListener("click", resetGame);

  window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.code === "Space") {
      e.preventDefault();
      useBomb();
    }
  });

  window.addEventListener("keyup", e => {
    keys[e.key] = false;
  });

  function setPointerFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    pointer.x = ((t.clientX - rect.left) / rect.width) * W;
    pointer.y = ((t.clientY - rect.top) / rect.height) * H;
  }

  canvas.addEventListener("pointerdown", e => {
    pointer.active = true;
    setPointerFromEvent(e);
  });

  canvas.addEventListener("pointermove", e => {
    if (!pointer.active) return;
    setPointerFromEvent(e);
  });

  canvas.addEventListener("pointerup", () => pointer.active = false);
  canvas.addEventListener("pointercancel", () => pointer.active = false);

  bombTouch.addEventListener("pointerdown", e => {
    e.stopPropagation();
    useBomb();
  });

  loop();
})();
</script>
</body>
</html>
